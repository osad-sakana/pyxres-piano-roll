name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 同時デプロイを防ぐ（進行中のデプロイはキャンセルしない）
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: ユニットテスト
        run: node --test test/*.test.js

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: 公開ファイルを収集（エディタ本体のみ）
        run: |
          mkdir dist
          cp index.html dist/
          cp -r css js dist/
      - uses: actions/configure-pages@v5
        with:
          enablement: true # Pages未有効のリポジトリでも初回実行時に自動で有効化する
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - name: デプロイ
        id: deployment
        uses: actions/deploy-pages@v4
